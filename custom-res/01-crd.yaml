apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  # Имя ОБЯЗАТЕЛЬНО должно быть: plural.group
  name: mysites.stable.example.com
spec:
  group: stable.example.com
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                image:
                  type: string
                replicas:
                  type: integer
  scope: Namespaced
  names:
    plural: mysites
    singular: mysite
    kind: MySite
    shortNames:
    - ms
